# astrowidget configuration template
#
# Copy this file to ~/.config/astrowidget/config.toml and edit.
# Then: chmod 600 ~/.config/astrowidget/config.toml
# The fetcher refuses to read configs that are not 0600.

[api]
# Astrospheric is OPTIONAL — it adds a North-America-only "Cloud Sense" feed plus
# its own seeing/transparency for sites inside its coverage. Without a key (or for
# sites outside North America) the widget uses the free 7Timer + Open-Meteo
# sources automatically. Get a Pro key from https://www.astrospheric.com/account
# (Pro tier is required for API access); leave it blank to run entirely free.
astrospheric_key = ""

# Pro accounts get 100 credits/day. GetForecastData_V1 costs 5 credits per call.
# Set to 0 to disable budget tracking. Only North-America sites use credits.
astrospheric_daily_credit_budget = 100

# NASA FIRMS active-fire detection (OPTIONAL, free, global). Surfaces nearby
# wildfires the coarse aerosol model can miss, and docks the transparency score
# when fires are close. Get a free key (enter your email, the key is emailed
# back, no approval wait): https://firms.modaps.eosdis.nasa.gov/api/map_key/
# Leave blank to disable — the widget then shows AOD/AQI only and the verdict is
# unaffected by fire proximity (graceful degradation).
firms_map_key = ""

# Radius (km) around each site to search for active fires. Default 150.
firms_radius_km = 150

# Open-Meteo is free and requires no key.
[open_meteo]
# Open-Meteo cloud-cover models for the multi-model ensemble. For North-America
# sites with a working Astrospheric feed, these three are averaged with
# Astrospheric's Cloud Sense (RDPS) into the consensus cloud; everywhere else
# (and whenever Astrospheric is unavailable) these three ARE the ensemble on
# their own, and their spread is the convergence indicator. GFS is taken from
# Open-Meteo only (Astrospheric's GFS/NAM are undocumented), so the mean never
# double-counts a model. These are distinct physical models — NOT Open-Meteo's
# best_match blend, which is itself a mix of them and would corrupt the spread.
models = ["gfs_seamless", "ecmwf_ifs04", "icon_seamless"]

# Add [[sites]] blocks for the sites you want to monitor.
# Lat/lon in decimal degrees, negative for south/west.
# `id` must be lowercase a-z 0-9; it is used as the state.json key.
#
# Astrospheric eligibility is AUTOMATIC, derived from lat/lon: sites inside its
# North-America coverage use the Astrospheric feed (when a key is set above), and
# the rest use 7Timer + Open-Meteo. If an in-coverage site's Astrospheric data
# fails (no key, rejected key, outage), the site falls back to the free sources
# and shows a dismissable notice — there is nothing to configure for that.
#
# Optional per-site flags:
#
#   primary  true  -> full always-on column in the popup (default).
#            false -> collapsed verdict chip; click to expand. Use for sites you
#                     only check occasionally.
#
#   managed  false -> HOME mode (default): a site where YOU image manually and the
#                     scope sits uncovered. The forecast protects your gear — a real
#                     chance of overnight rain HARD-VETOES the night (precip veto) —
#                     while partial cloud is NOT a hard gate (it flows into the score
#                     plus a "best window" so you can still gamble on clear gaps).
#            true  -> REMOTE mode: a hosted, weatherproof dome (e.g. iTelescope) that
#                     closes itself in bad weather. The precip equipment veto is
#                     SKIPPED (the dome self-protects); the verdict is a clean
#                     go/no-go driven by cloud + wind. Set this for hosted sites.
#                     (Truly overcast still reads "Neither" in BOTH modes — nobody
#                     images through solid cloud.)
#
#   bortle   1-9   -> your site's Bortle dark-sky class, the sky-brightness baseline
#                     (1 = pristine dark, 9 = inner city). It sets how much moonlight
#                     and light pollution cost the score each night.
#                     FALLBACK: omit it and the engine uses a documented
#                     suburban-unknown default baseline (~Bortle 4-5). The
#                     geometry-aware moon penalty applies either way, so the score
#                     works without it — bortle only refines the baseline. A future
#                     release may auto-derive Bortle from your lat/lon; an explicit
#                     value here always overrides that.

[[sites]]
id = "site_a"
label = "My Site"
lat = 0.0
lon = 0.0
timezone = "UTC"
# primary = true            # full column (this is the default)
# managed = false           # HOME mode (default): protect an uncovered scope
# bortle  = 5               # your Bortle class; omit to use the default baseline

# A hosted / REMOTE observatory — weatherproof dome, so set managed = true
# (Astrospheric is used automatically if it's in North America):
# [[sites]]
# id = "site_b"
# label = "Remote Observatory"
# lat = 0.0
# lon = 0.0
# timezone = "America/Denver"
# managed = true            # weatherproof dome: skip the precip equipment veto
# bortle = 3                # dark hosted site (refines the sky-brightness baseline)

# A site outside North America — automatically uses 7Timer + Open-Meteo:
# [[sites]]
# id = "site_c"
# label = "Southern Hemisphere Site"
# lat = 0.0
# lon = 0.0
# timezone = "UTC"

# A SECONDARY site — collapsed chip, click to expand:
# [[sites]]
# id = "site_d"
# label = "Rarely-Used Site"
# lat = 0.0
# lon = 0.0
# timezone = "UTC"
# primary = false

# Optional per-site veto thresholds. Defaults come from the scoring engine's
# calibration constants -- override only when your site/scope needs it.
#
# The threshold-section key must EXACTLY match the site's `id` above (incl.
# capitalization), or the override silently won't apply.
#
# [thresholds.site_a]
#
# wind_max_kmh: vetoes the night if AVERAGE wind over the astro-dark imaging
#   window exceeds this (tracking/equipment risk). iTelescope domes auto-close
#   near 48 km/h (~30 mph), so ~48 is a natural ceiling for hosted sites.
# wind_max_kmh = 40
#
# precip_max_pct: EQUIPMENT-PROTECTION veto. Fires if the PEAK (highest)
#   precipitation probability during the SUNSET-TO-SUNRISE window (when the
#   scope is uncovered) exceeds this. Daytime rain is ignored (scope covered).
#   This is a PEAK check, not an average: a single risky hour vetoes the night.
#   So 5 means "veto if any overnight hour shows >5% chance" — very strict
#   (marine/humid sites veto most nights). ~15-20 captures a real chance of
#   rain while ignoring trivial 5-10% forecast noise. Default 30.
# precip_max_pct = 20
#
# dew_spread_min_c: vetoes if AVERAGE (temp - dewpoint) over the imaging window
#   drops below this (condensation risk on optics/electronics). Default 1.5.
# dew_spread_min_c = 1.5

[notifications]
# Fire notification when tonight's verdict transitions upward
# (Neither -> NB-only, NB-only -> BB+NB, Neither -> BB+NB).
upward_transitions = true

# Fire notification when tonight's verdict degrades, but only on the day-of
# (e.g., after sunset on the same day you were planning to image).
downward_transitions_day_of = true

# Fire a reminder notification when astronomical dark begins at a site with
# a current GO verdict. This is the imaging-start reminder.
astro_dark_start_reminder = true

# If true, all notifications are suppressed during astronomical dark hours
# at the user's primary site. Default false because the astro-dark-begins
# reminder is meant to fire during dark hours.
suppress_during_astro_dark = false

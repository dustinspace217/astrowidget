; AstroWidget.ini — Rainmeter skin for astrowidget (Windows desktop).
;
; A glanceable dashboard of tonight's imaging verdict per configured site, read
; from the SAME state.json the KDE plasmoid and the cross-platform desktop app
; use. This skin is a pure PRESENTATION layer — it only READS the file; the
; Python fetcher (run by Task Scheduler) keeps state.json fresh. See the repo
; README ("Windows — Rainmeter") for install + scheduling.
;
; Rainmeter model: MEASURES gather data, METERS draw it. The single Script
; measure below runs @Resources\Scripts\state.lua, which decodes state.json and
; exposes per-site values to the meters via inline Lua, e.g.
;   [&MeasureState:LineA(1)]   ← needs DynamicVariables=1 on the consuming meter.

[Rainmeter]
Update=1000
; Drag to position while setting up; lock via the skin's right-click menu after.
AccurateText=1

[Metadata]
Name=AstroWidget
Author=Dustin (space.dustin.astrowidget)
Information=Astrophotography weather verdict per site, read from the astrowidget fetcher's state.json. Requires the fetcher on a Task Scheduler job. See the project README.
Version=1.0.0
License=MIT

; ─────────────────────────────────────────────────────────────────────────────
; [Variables] — tweak these to taste.
; STATEFILE: leave EMPTY to use the canonical path
;   %LOCALAPPDATA%\cache\astrowidget\state.json (where the fetcher writes on
;   Windows). Set an absolute path here only if you relocated the cache.
; ─────────────────────────────────────────────────────────────────────────────
[Variables]
STATEFILE=
Width=300
FontName=Segoe UI
; Header / detail text colors (R,G,B,A). Per-site verdict colors come from Lua.
ColorText=235,238,245,255
ColorMuted=150,160,175,235
ColorPanel=20,22,30,205

; ── The data source: one Lua script measure, polled every ~6s (Update 1000ms
;    × UpdateDivider 6). state.json changes only a few times a day, so there's no
;    value reading the disk every second. ───────────────────────────────────────
[MeasureState]
Measure=Script
ScriptFile=#@#Scripts\state.lua
UpdateDivider=6

; ── Background panel. A rounded rectangle whose HEIGHT auto-sizes to the number
;    of sites via the Lua SkinHeight(). DynamicVariables=1 is required for the
;    inline-Lua height to re-evaluate each refresh. ────────────────────────────
[MeterBackground]
Meter=Shape
DynamicVariables=1
Shape=Rectangle 0,0,(#Width#),([&MeasureState:SkinHeight()]),12 | Fill Color #ColorPanel# | StrokeWidth 1 | Stroke Color 255,255,255,20

; ── Header: title + "updated Nm ago" ─────────────────────────────────────────
[MeterTitle]
Meter=String
X=14
Y=12
FontFace=#FontName#
FontSize=11
FontWeight=700
FontColor=#ColorText#
AntiAlias=1
Text=astrowidget

[MeterUpdated]
Meter=String
DynamicVariables=1
X=(#Width# - 14)
Y=14
StringAlign=Right
FontFace=#FontName#
FontSize=9
FontColor=#ColorMuted#
AntiAlias=1
Text=[&MeasureState:Updated()]

; ─────────────────────────────────────────────────────────────────────────────
; Per-site rows. Eight fixed slots (covers up to 8 sites); a slot whose index
; exceeds the site count gets an empty string from Lua and simply draws nothing.
; Two meters per slot: line A (label · REMOTE · verdict, colored by verdict) and
; line B (BB/NB scores · cloud · best-clear window, muted). MeterStyles keep the
; per-slot sections to just their position + which Lua slot they read.
;
; Slot i top Y = 40 + (i-1)*36; line B sits 17px below line A. This matches the
; Lua SkinHeight() = 40 + sites*36 + 6 so the panel hugs the content.
; ─────────────────────────────────────────────────────────────────────────────
[StyleLineA]
Meter=String
DynamicVariables=1
X=14
FontFace=#FontName#
FontSize=11
FontWeight=600
AntiAlias=1
ClipString=1
W=(#Width# - 28)

[StyleLineB]
Meter=String
DynamicVariables=1
X=14
FontFace=#FontName#
FontSize=9
FontColor=#ColorMuted#
AntiAlias=1
ClipString=1
W=(#Width# - 28)

[MeterSite1A]
MeterStyle=StyleLineA
Y=40
FontColor=[&MeasureState:Color(1)]
Text=[&MeasureState:LineA(1)]
[MeterSite1B]
MeterStyle=StyleLineB
Y=57
Text=[&MeasureState:LineB(1)]

[MeterSite2A]
MeterStyle=StyleLineA
Y=76
FontColor=[&MeasureState:Color(2)]
Text=[&MeasureState:LineA(2)]
[MeterSite2B]
MeterStyle=StyleLineB
Y=93
Text=[&MeasureState:LineB(2)]

[MeterSite3A]
MeterStyle=StyleLineA
Y=112
FontColor=[&MeasureState:Color(3)]
Text=[&MeasureState:LineA(3)]
[MeterSite3B]
MeterStyle=StyleLineB
Y=129
Text=[&MeasureState:LineB(3)]

[MeterSite4A]
